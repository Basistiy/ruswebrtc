<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple WebRTC DataChannel Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f7;
        --panel: #ffffff;
        --border: #d6d6d6;
        --text: #202124;
        --muted: #5f6368;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      button,
      input {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
      }

      button {
        cursor: pointer;
      }

      input {
        flex: 1;
        min-width: 180px;
      }

      #log {
        white-space: pre-wrap;
        background: #f0f0f0;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        min-height: 180px;
        max-height: 300px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>WebRTC DataChannel via WebSocket Signaling</h1>
        <p>
          Host clicks <strong>Start Call</strong> to create and share invite link. Guest opens link and
          clicks <strong>Start Call</strong>.
        </p>

        <div class="row">
          <button id="callBtn">Start Call</button>
          <button id="copyLinkBtn">Copy Invite Link</button>
          <input id="shareLinkInput" readonly placeholder="Invite link will appear here" />
        </div>

        <div class="row">
          <input id="messageInput" placeholder="Type a message" />
          <button id="sendBtn">Send</button>
        </div>

        <div id="log"></div>
        <audio id="remoteAudio" autoplay playsinline></audio>
      </div>
    </div>

    <script>
      const callBtn = document.getElementById('callBtn');
      const copyLinkBtn = document.getElementById('copyLinkBtn');
      const sendBtn = document.getElementById('sendBtn');
      const messageInput = document.getElementById('messageInput');
      const shareLinkInput = document.getElementById('shareLinkInput');
      const logEl = document.getElementById('log');
      const remoteAudioEl = document.getElementById('remoteAudio');

      let ws;
      let pc;
      let audioSender;
      let localAudioStream;
      let remoteAudioStream;
      let dataChannel;
      let localAudioTrack;
      let peerCount = 0;
      let startedAsCaller = false;
      let callInitialized = false;
      let signalChain = Promise.resolve();
      let pendingCandidates = [];
      let rtcConfig = null;
      let speakerEnabled = false;
      let currentRoom = '';
      let createdRoom = false;
      const initialRoomParam = new URLSearchParams(window.location.search).get('room');
      if (initialRoomParam) {
        currentRoom = initialRoomParam.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '').slice(0, 64);
        if (currentRoom) {
          shareLinkInput.value = roomLink(currentRoom);
        }
      }
      const rtcConfigReady = fetch('/rtc-config')
        .then((response) => {
          if (!response.ok) {
            throw new Error(`failed to load rtc config: ${response.status}`);
          }
          return response.json();
        })
        .then((config) => {
          rtcConfig = config;
          const first = Array.isArray(config.iceServers) ? config.iceServers[0] : null;
          const urls = first && first.urls ? first.urls : [];
          const displayUrls = Array.isArray(urls) ? urls.join(', ') : String(urls);
          log(`[webrtc] TURN config loaded: ${displayUrls}`);
        })
        .catch((error) => {
          log(`[webrtc][error] ${error.message}`);
        });

      function log(message) {
        logEl.textContent += `${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function sendSignal(type, payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          log('[signal] not connected');
          return;
        }
        ws.send(JSON.stringify({ type, payload }));
      }

      function generateRoomId() {
        return `room-${Math.random().toString(36).slice(2, 8)}`;
      }

      function roomLink(room) {
        const url = new URL(window.location.href);
        url.searchParams.set('room', room);
        return url.toString();
      }

      function ensurePeerConnection() {
        if (!rtcConfig) {
          throw new Error('TURN config is not loaded yet');
        }
        if (pc) return pc;

        pc = new RTCPeerConnection(rtcConfig);
        pc.addTransceiver('audio', { direction: 'recvonly' });
        audioSender = null;
        if (localAudioTrack) {
          const streamForTrack = localAudioStream || new MediaStream([localAudioTrack]);
          audioSender = pc.addTrack(localAudioTrack, streamForTrack);
          renegotiateIfNeeded().catch((error) => {
            log(`[voice][error] failed to reattach mic: ${error.message}`);
          });
        }

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            sendSignal('candidate', event.candidate);
          }
        };

        pc.onconnectionstatechange = () => {
          log(`[webrtc] connection state: ${pc.connectionState}`);
        };

        pc.ondatachannel = (event) => {
          dataChannel = event.channel;
          attachDataChannelHandlers(dataChannel);
        };

        pc.ontrack = (event) => {
          if (!remoteAudioStream) {
            remoteAudioStream = new MediaStream();
            remoteAudioEl.srcObject = remoteAudioStream;
          }
          remoteAudioStream.addTrack(event.track);
          if (speakerEnabled) {
            remoteAudioEl.play().catch((error) => {
              log(`[voice][error] speaker playback failed: ${error.message}`);
            });
          } else {
            log('[voice] click "Enable Speaker" to allow playback');
          }
          log('[voice] remote audio track received');
        };

        return pc;
      }

      function resetLocalAudioTrack() {
        if (!localAudioTrack) return;
        localAudioTrack.onmute = null;
        localAudioTrack.onunmute = null;
        localAudioTrack.onended = null;
        try {
          localAudioTrack.stop();
        } catch {}
        localAudioTrack = null;
        localAudioStream = null;
      }

      async function enableMicrophone() {
        if (!localAudioTrack) {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('Microphone requires HTTPS and browser mediaDevices support');
          }

          let stream;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
              },
              video: false,
            });
          } catch (error) {
            log(`[voice] advanced audio constraints failed, retrying basic capture: ${error.message}`);
            stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          }

          localAudioStream = stream;
          localAudioTrack = stream.getAudioTracks()[0];
          localAudioTrack.contentHint = 'speech';
          localAudioTrack.onmute = () => log('[voice] local mic track muted by browser/device');
          localAudioTrack.onunmute = () => log('[voice] local mic track unmuted');
          localAudioTrack.onended = () => log('[voice] local mic track ended');
          log(
            `[voice] mic track ready state=${localAudioTrack.readyState} enabled=${localAudioTrack.enabled} muted=${localAudioTrack.muted}`
          );
          await rtcConfigReady;
          const localPc = ensurePeerConnection();
          if (!audioSender) {
            audioSender = localPc.addTrack(localAudioTrack, localAudioStream);
          } else {
            await audioSender.replaceTrack(localAudioTrack);
          }
          localAudioTrack.enabled = true;
          log('[voice] microphone enabled');
          await renegotiateIfNeeded();
          return;
        }
        if (!localAudioTrack.enabled) {
          localAudioTrack.enabled = true;
          log('[voice] microphone unmuted');
          await renegotiateIfNeeded();
        }
      }

      async function enableSpeaker() {
        remoteAudioEl.muted = false;
        remoteAudioEl.volume = 1;
        speakerEnabled = true;
        if (remoteAudioEl.srcObject) {
          await remoteAudioEl.play();
        }
        log('[voice] speaker output enabled');
      }

      async function flushPendingCandidates(localPc) {
        if (!localPc.remoteDescription) return;
        while (pendingCandidates.length > 0) {
          const candidate = pendingCandidates.shift();
          try {
            await localPc.addIceCandidate(candidate);
          } catch (error) {
            log(`[signal][error] queued addIceCandidate failed: ${error.message}`);
          }
        }
      }

      function attachDataChannelHandlers(channel) {
        channel.onopen = () => log('[data] channel open');
        channel.onclose = () => log('[data] channel closed');
        channel.onmessage = (event) => log(`[peer] ${event.data}`);
      }

      async function renegotiateIfNeeded() {
        if (!pc || !ws || ws.readyState !== WebSocket.OPEN) return;
        if (!pc.remoteDescription || pc.signalingState !== 'stable') return;
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        sendSignal('offer', pc.localDescription);
        log('[signal] renegotiation offer sent');
      }

      async function startAsCaller() {
        await rtcConfigReady;
        if (startedAsCaller) {
          log('[webrtc] caller already started');
          return;
        }
        if (peerCount < 2) {
          log('[webrtc] waiting for second peer to connect');
          return;
        }

        startedAsCaller = true;
        const localPc = ensurePeerConnection();
        dataChannel = localPc.createDataChannel('chat');
        attachDataChannelHandlers(dataChannel);

        const offer = await localPc.createOffer();
        await localPc.setLocalDescription(offer);
        sendSignal('offer', localPc.localDescription);
        log('[signal] offer sent');
      }

      async function onSignalMessage(event) {
        const msg = JSON.parse(event.data);

        if (msg.type === 'welcome') {
          log(`[signal] connected as peer ${msg.peerId} in room ${msg.roomId || currentRoom}`);
          return;
        }

        if (msg.type === 'peers') {
          peerCount = msg.count;
          log(`[signal] peers in room: ${peerCount}`);
          if (createdRoom && peerCount === 2 && !startedAsCaller) {
            startAsCaller().catch((error) => log(`[webrtc][error] ${error.message}`));
          }
          return;
        }

        if (msg.type === 'peer-left') {
          log('[signal] peer disconnected');
          if (dataChannel) dataChannel.close();
          if (pc) pc.close();
          pc = null;
          audioSender = null;
          remoteAudioStream = null;
          remoteAudioEl.srcObject = null;
          dataChannel = null;
          resetLocalAudioTrack();
          return;
        }

        if (msg.type === 'error') {
          log(`[signal][error] ${msg.message}`);
          return;
        }

        await rtcConfigReady;
        const localPc = ensurePeerConnection();

        if (msg.type === 'offer') {
          log('[signal] offer received');
          if (localPc.signalingState !== 'stable') {
            log('[signal] non-stable state, trying rollback');
            try {
              await localPc.setLocalDescription({ type: 'rollback' });
            } catch (error) {
              log(`[signal][error] rollback failed: ${error.message}`);
              throw error;
            }
          }
          const remoteOffer =
            typeof RTCSessionDescription !== 'undefined'
              ? new RTCSessionDescription(msg.payload)
              : msg.payload;
          await localPc.setRemoteDescription(remoteOffer);
          log('[signal] remote offer applied');
          await flushPendingCandidates(localPc);
          log('[signal] pending candidates flushed');
          const answer = await localPc.createAnswer();
          log('[signal] local answer created');
          await localPc.setLocalDescription(answer);
          log('[signal] local answer applied');
          sendSignal('answer', localPc.localDescription);
          log('[signal] offer received, answer sent');
          return;
        }

        if (msg.type === 'answer') {
          const remoteAnswer =
            typeof RTCSessionDescription !== 'undefined'
              ? new RTCSessionDescription(msg.payload)
              : msg.payload;
          await localPc.setRemoteDescription(remoteAnswer);
          await flushPendingCandidates(localPc);
          log('[signal] answer received');
          return;
        }

        if (msg.type === 'candidate') {
          if (!localPc.remoteDescription) {
            pendingCandidates.push(msg.payload);
            log('[signal] candidate queued (no remote description yet)');
            return;
          }
          try {
            const candidate =
              typeof RTCIceCandidate !== 'undefined'
                ? new RTCIceCandidate(msg.payload)
                : msg.payload;
            await localPc.addIceCandidate(candidate);
            log('[signal] candidate applied');
          } catch (error) {
            log(`[signal][error] addIceCandidate failed: ${error.message}`);
          }
        }
      }

      function connectSignaling() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
          log('[signal] already connected or connecting');
          return;
        }

        const roomUrl = new URL(window.location.href);
        roomUrl.searchParams.set('room', currentRoom);
        window.history.replaceState({}, '', roomUrl.toString());
        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws?room=${encodeURIComponent(currentRoom)}`);

        ws.onopen = () => {
          log(`[signal] websocket open (room: ${currentRoom})`);
        };
        ws.onmessage = (event) => {
          signalChain = signalChain.then(() => onSignalMessage(event)).catch((error) => {
            log(`[signal][error] ${error.message}`);
          });
        };
        ws.onclose = () => {
          log('[signal] websocket closed');
          ws = null;
          peerCount = 0;
          startedAsCaller = false;
          pendingCandidates = [];
          if (pc) pc.close();
          pc = null;
          audioSender = null;
          remoteAudioStream = null;
          remoteAudioEl.srcObject = null;
          dataChannel = null;
          resetLocalAudioTrack();
        };
        ws.onerror = () => log('[signal][error] websocket error');

        if (!window.RTCPeerConnection) {
          log('[webrtc][error] RTCPeerConnection unavailable. Use HTTPS on phone/browser.');
        }
      }

      function sendDataMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        if (!dataChannel || dataChannel.readyState !== 'open') {
          log('[data] channel not open yet');
          return;
        }
        dataChannel.send(text);
        log(`[you] ${text}`);
        messageInput.value = '';
      }

      async function copyInviteLink() {
        if (!currentRoom) {
          throw new Error('Start call first to generate room');
        }
        const link = roomLink(currentRoom);
        shareLinkInput.value = link;
        await navigator.clipboard.writeText(link);
        log(`[signal] invite link copied for room: ${currentRoom}`);
      }

      async function startCall() {
        if (callInitialized) {
          log('[call] already initialized');
          return;
        }

        if (!currentRoom) {
          currentRoom = generateRoomId();
          createdRoom = true;
          const link = roomLink(currentRoom);
          shareLinkInput.value = link;
          window.history.replaceState({}, '', link);
        } else {
          shareLinkInput.value = roomLink(currentRoom);
          log(`[call] joining room: ${currentRoom}`);
        }

        // Keep media permission calls as the first privileged operations for iPhone Safari.
        await enableSpeaker();
        await enableMicrophone();
        connectSignaling();

        if (createdRoom) {
          try {
            await navigator.clipboard.writeText(shareLinkInput.value);
            log(`[call] room created: ${currentRoom}. Invite link copied.`);
          } catch {
            log(`[call] room created: ${currentRoom}. Copy link with button.`);
          }
        }

        callInitialized = true;
        callBtn.textContent = createdRoom ? 'Waiting For Peer...' : 'Connecting...';
        callBtn.disabled = true;
      }

      copyLinkBtn.addEventListener('click', () => {
        copyInviteLink().catch((error) => log(`[signal][error] copy link failed: ${error.message}`));
      });
      callBtn.addEventListener('click', () => {
        startCall().catch((error) => log(`[call][error] ${error.message}`));
      });
      sendBtn.addEventListener('click', sendDataMessage);
      messageInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          sendDataMessage();
        }
      });

      window.addEventListener('beforeunload', () => {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
          ws.close(1000, 'page unload');
        }
      });
    </script>
  </body>
</html>
